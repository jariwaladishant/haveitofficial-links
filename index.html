<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Have It! — Links</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <script defer src="https://cdn.vercel-insights.com/v1/script.debug.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --purple-deep:  #4A1A8A;
      --purple-mid:   #6B2FBF;
      --purple-light: #8B45D4;
      --purple-blob:  #7A38C8;
      --orange:       #FF7A2F;
      --white:        #FFFFFF;
      --white-soft:   rgba(255,255,255,0.92);
      --white-muted:  rgba(255,255,255,0.65);
      --shadow:       rgba(0,0,0,0.28);
    }

    body {
      min-height: 100vh;
      background: var(--purple-mid);
      font-family: 'Inter', sans-serif;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 0 0 48px;
      overflow-x: hidden;
      position: relative;
    }

    /* Animated blob background — the signature element */
    .bg-canvas {
      position: fixed;
      inset: 0;
      z-index: 0;
      background: var(--purple-mid);
      overflow: hidden;
    }
    .blob {
      position: absolute;
      border-radius: 50%;
      filter: blur(0px);
      opacity: 0.18;
    }
    .blob-1 { width: 340px; height: 220px; background: var(--purple-deep); top: -60px; left: -80px; border-radius: 60% 40% 70% 30% / 50% 60% 40% 50%; animation: morph1 9s ease-in-out infinite; }
    .blob-2 { width: 280px; height: 200px; background: var(--purple-light); top: 30%; right: -60px; border-radius: 40% 60% 30% 70% / 60% 40% 50% 50%; animation: morph2 11s ease-in-out infinite; }
    .blob-3 { width: 200px; height: 260px; background: var(--purple-deep); bottom: 10%; left: 10%; border-radius: 70% 30% 50% 50% / 40% 60% 40% 60%; animation: morph3 13s ease-in-out infinite; }
    .blob-4 { width: 180px; height: 180px; background: var(--purple-light); top: 55%; right: 5%; border-radius: 50% 50% 30% 70% / 60% 40% 60% 40%; animation: morph1 8s ease-in-out infinite reverse; }

    @keyframes morph1 {
      0%,100% { border-radius: 60% 40% 70% 30% / 50% 60% 40% 50%; transform: scale(1) rotate(0deg); }
      50% { border-radius: 30% 70% 40% 60% / 60% 30% 70% 40%; transform: scale(1.1) rotate(8deg); }
    }
    @keyframes morph2 {
      0%,100% { border-radius: 40% 60% 30% 70% / 60% 40% 50% 50%; transform: scale(1) rotate(0deg); }
      50% { border-radius: 70% 30% 60% 40% / 40% 60% 40% 60%; transform: scale(1.08) rotate(-10deg); }
    }
    @keyframes morph3 {
      0%,100% { border-radius: 70% 30% 50% 50% / 40% 60% 40% 60%; transform: scale(1); }
      50% { border-radius: 40% 60% 70% 30% / 60% 40% 60% 40%; transform: scale(1.12); }
    }

    /* Page container */
    .page {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 480px;
      padding: 48px 20px 40px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* Logo */
    .logo-wrap {
      width: 96px;
      height: 96px;
      border-radius: 50%;
      background: var(--purple-deep);
      border: 3px solid rgba(255,255,255,0.25);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      box-shadow: 0 8px 32px rgba(0,0,0,0.35);
      margin-bottom: 18px;
      flex-shrink: 0;
    }
    .logo-inner {
      text-align: center;
      line-height: 1;
      user-select: none;
    }
    .logo-have {
      font-family: 'Nunito', sans-serif;
      font-weight: 900;
      font-size: 22px;
      color: var(--white);
      display: block;
    }
    .logo-it {
      font-family: 'Nunito', sans-serif;
      font-weight: 900;
      font-size: 26px;
      color: var(--orange);
      display: block;
      margin-top: -4px;
    }
    .logo-tagline {
      font-size: 7px;
      color: var(--white-muted);
      display: block;
      margin-top: 2px;
      letter-spacing: 0.2px;
    }

    /* Profile text */
    .handle {
      font-family: 'Nunito', sans-serif;
      font-weight: 900;
      font-size: 26px;
      color: var(--white);
      letter-spacing: -0.5px;
      margin-bottom: 8px;
    }
    .bio {
      font-size: 14px;
      color: var(--white-muted);
      text-align: center;
      line-height: 1.55;
      max-width: 300px;
      margin-bottom: 22px;
    }

    /* Social icons */
    .socials {
      display: flex;
      gap: 18px;
      margin-bottom: 36px;
    }
    .social-icon {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: rgba(255,255,255,0.12);
      border: 1.5px solid rgba(255,255,255,0.2);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: background 0.2s, transform 0.15s;
      text-decoration: none;
    }
    .social-icon:hover { background: rgba(255,255,255,0.22); transform: scale(1.1); }
    .social-icon svg { width: 20px; height: 20px; fill: white; }

    /* Links */
    .links-list {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .link-card {
      width: 100%;
      background: var(--white);
      border: 2.5px solid #111;
      border-radius: 100px;
      padding: 0 20px;
      height: 64px;
      display: flex;
      align-items: center;
      gap: 14px;
      cursor: pointer;
      text-decoration: none;
      box-shadow: 3px 4px 0px #111;
      transition: transform 0.12s, box-shadow 0.12s;
      position: relative;
      overflow: hidden;
    }
    .link-card:hover {
      transform: translate(-2px, -2px);
      box-shadow: 5px 6px 0px #111;
    }
    .link-card:active {
      transform: translate(1px, 1px);
      box-shadow: 1px 2px 0px #111;
    }

    .link-icon {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: var(--purple-mid);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .link-icon svg { width: 18px; height: 18px; fill: white; }
    .link-icon-emoji { font-size: 18px; line-height: 1; }

    .link-text {
      flex: 1;
      text-align: center;
    }
    .link-title {
      font-family: 'Nunito', sans-serif;
      font-weight: 800;
      font-size: 15px;
      color: #111;
      display: block;
      letter-spacing: -0.2px;
    }
    .link-sub {
      font-size: 11px;
      color: #666;
      display: block;
      margin-top: 1px;
    }

    .link-arrow {
      width: 28px;
      text-align: right;
      color: #999;
      font-size: 16px;
      flex-shrink: 0;
    }

    /* Divider */
    .divider {
      display: flex;
      align-items: center;
      gap: 10px;
      width: 100%;
      margin: 10px 0 4px;
    }
    .divider-line { flex: 1; height: 1px; background: rgba(255,255,255,0.2); }
    .divider-label { font-size: 11px; color: var(--white-muted); text-transform: uppercase; letter-spacing: 1.2px; font-weight: 600; }

    /* Footer */
    .footer {
      margin-top: 40px;
      text-align: center;
      width: 100%;
    }
    .footer-brand {
      font-family: 'Nunito', sans-serif;
      font-weight: 900;
      font-size: 13px;
      color: rgba(255,255,255,0.35);
      letter-spacing: 0.5px;
    }
    .footer-brand span { color: var(--orange); }

    /* Ripple on click */
    @keyframes ripple {
      to { transform: scale(4); opacity: 0; }
    }
    .ripple-circle {
      position: absolute;
      border-radius: 50%;
      background: rgba(107,47,191,0.15);
      width: 80px; height: 80px;
      margin-top: -40px; margin-left: -40px;
      animation: ripple 0.5s linear;
      pointer-events: none;
    }
  </style>
</head>

<script>
  function rippleEffect(e) {
    const card = e.currentTarget;
    const circle = document.createElement('span');
    circle.classList.add('ripple-circle');
    const rect = card.getBoundingClientRect();
    circle.style.left = (e.clientX - rect.left) + 'px';
    circle.style.top = (e.clientY - rect.top) + 'px';
    card.appendChild(circle);
    setTimeout(() => circle.remove(), 600);
  }
</script>
